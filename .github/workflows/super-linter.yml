# This workflow executes several linters on changed files based on languages used in your code base whenever
# you push a code or open a pull request.
#
# You can adjust the behavior by modifying this file.
# For more information, see:
# https://github.com/github/super-linter
name: Lint Code Base

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
jobs:
  run-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Full git history is needed to get a proper list of changed files within `super-linter`
          fetch-depth: 0

      - name: Lint Code Base
        uses: super-linter/super-linter@v7
        env:
          VALIDATE_JAVASCRIPT_ES: true
          VALIDATE_TYPESCRIPT_ES: true
          VALIDATE_TSX: true
          VALIDATE_JSX: true
          VALIDATE_JSON: false
          VALIDATE_CSS: false
          VALIDATE_MARKDOWN: false
          VALIDATE_NATURAL_LANGUAGE: false
          VALIDATE_JAVASCRIPT_STANDARD: false
          VALIDATE_TYPESCRIPT_STANDARD: false
          VALIDATE_HTML: false
          VALIDATE_XML: true
          VALIDATE_YAML: true
          VALIDATE_CHECKOV: false
          VALIDATE_JSCPD: false
          VALIDATE_GO: false
          VALIDATE_RUST: false
          # Prettier is often redundant when using ESLint with formatting rules or it conflicts with local setup
          VALIDATE_JAVASCRIPT_PRETTIER: false
          VALIDATE_TYPESCRIPT_PRETTIER: false
          VALIDATE_JSON_PRETTIER: false
          VALIDATE_CSS_PRETTIER: false
          VALIDATE_MARKDOWN_PRETTIER: false
          VALIDATE_HTML_PRETTIER: false
          VALIDATE_ALL_CODEBASE: true
          # Exclude generated files and common vendor files
          FILTER_REGEX_EXCLUDE: (.*pnpm-lock\.yaml|.*dist/.*|.*node_modules/.*|.*src/assets/foods\.generated\.json.*)
          DEFAULT_BRANCH: "main"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
