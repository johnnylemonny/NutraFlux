<svg
  viewBox="0 0 64 64"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <linearGradient
      id="nutraflux-gradient-favicon"
      x1="0%"
      y1="0%"
      x2="100%"
      y2="100%"
      gradientUnits="userSpaceOnUse"
    >
      <stop stopColor="#10b981" />
      <stop offset="1" stopColor="#059669" stopOpacity="0.7" />
    </linearGradient>
    <filter id="logo-glow-favicon" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  {/* Outer Ring */}
  <circle
    cx="32"
    cy="32"
    r="28"
    stroke="#10b981"
    strokeWidth="4"
    opacity="0.1"
  />

  {/* Active Flux Path */}
  <path
    d="M32 4C39.4239 4 46.5436 6.95001 51.799 12.2054C57.0544 17.4607 60.0044 24.5804 60.0044 32.0044C60.0044 39.4284 57.0544 46.548 51.799 51.8034"
    stroke="url(#nutraflux-gradient-favicon)"
    strokeWidth="5"
    strokeLinecap="round"
  />

  {/* Styled 'N' */}
  <path
    d="M20 44V20L44 44V20"
    stroke="url(#nutraflux-gradient-favicon)"
    strokeWidth="6"
    strokeLinecap="round"
    strokeLinejoin="round"
  />

  {/* Accent Dot */}
  <circle cx="51.799" cy="51.8034" r="3.5" fill="#10b981" />
</svg>
